<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Demo 1: ESM + Import Map</title>
    <style>
        body {
            font-family: monospace;
            background: #0f172a;
            color: #f8fafc;
            padding: 2rem;
        }

        .box {
            border: 1px solid #334155;
            padding: 1.5rem;
            border-radius: 8px;
            background: #1e293b;
        }

        .pass {
            color: #4ade80;
        }

        .label {
            color: #94a3b8;
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            display: block;
        }
    </style>
</head>

<body>
    <h3>⏳ Demo 1: ESM + Import Map</h3>
    <div class="box">
        <span class="label">STATUS</span>
        <div id="status">Loading...</div>
        <br>
        <span class="label">RESULT</span>
        <pre id="output"></pre>
    </div>

    <script type="importmap">
    {
      "imports": {
        "@magmacomputing/tempo": "../dist/tempo.index.js"
      }
    }
    </script>

    <script type="module">
        import { Tempo } from '@magmacomputing/tempo';

        try {
            const t = new Tempo('next monday');
            document.getElementById('output').innerText = `Full ESM Resolution: ${t.format('{dd} {mon} {yyyy}')}`;
            document.getElementById('status').innerHTML = '<span class="pass">✓ PASSED</span>';
        } catch (e) {
            document.getElementById('status').innerText = 'FAILED: ' + e.message;
            console.error(e);
        }
    </script>
</body>

</html>
