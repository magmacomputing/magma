<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<title>Tempo Bundle Demo</title>
	<style>
		body {
			font-family: monospace;
			padding: 2rem;
			background: #1a1a2e;
			color: #eee;
		}

		h1 {
			color: #a78bfa;
		}

		pre {
			background: #0f0f1a;
			padding: 1rem;
			border-radius: 6px;
			border: 1px solid #333;
			white-space: pre-wrap;
		}

		.ok {
			color: #4ade80;
		}

		.err {
			color: #f87171;
		}
	</style>
</head>

<body>
	<h1>Tempo Bundle Demo</h1>
	<p>Loaded via a plain <code>&lt;script&gt;</code> tag (no import-maps, no modules).</p>
	<pre id="output">Running…</pre>

	<!-- Single self-contained script tag — polyfill + Tempo bundled together -->
	<script src="../dist/tempo.bundle.js"></script>

	<script>
		const out = document.getElementById('output');
		const lines = [];

		function log(label, value, ok = true) {
			const cls = ok ? 'ok' : 'err';
			lines.push(`<span class="${cls}">${label}: ${value}</span>`);
			out.innerHTML = lines.join('\n');
		}

		try {
			log('typeof window.Tempo', typeof window.Tempo, typeof window.Tempo === 'function');

			const t = new Tempo('2025-12-25');
			log('new Tempo("2025-12-25")', t.toString());

			const formatted = t.format('{www}, {dd} {mmm} {yyyy}');
			log('format("www, dd mmm yyyy")', formatted);

			const added = t.add({ 'month': 1 });
			log('add({ "month": 1 })', added.toString());

			log('✓ Bundle is working', 'Tempo is available as window.Tempo');
		} catch (e) {
			log('✗ Error', e.message, false);
			console.error(e);
		}
	</script>
</body>

</html>
